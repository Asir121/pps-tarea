name: DAST Scan

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    
    # IMPORTANTE: Permisos para que ZAP pueda crear el Issue
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout del repositorio principal
        uses: actions/checkout@v4

      - name: Clone Juice Shop
        run: git clone https://github.com/juice-shop/juice-shop.git juice-shop

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: juice-shop
        run: npm install

      - name: Start Juice Shop
        working-directory: juice-shop
        run: |
          npm start &
          sleep 60

      - name: Verify Juice Shop
        run: curl http://localhost:3000

      - name: ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'http://localhost:3000'
          # Parámetros corregidos según el log de error
          allow_issue_writing: true
          issue_title: 'Security Scan Report'
