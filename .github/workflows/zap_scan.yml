name: DAST Scan

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  zap_scan:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: juice-shop

    steps:
      - name: Checkout del repositorio principal
        uses: actions/checkout@v4

      # --- NUEVO PASO: Clonar Juice Shop directamente en el runner ---
      - name: Clone Juice Shop
        run: |
          cd ..
          git clone https://github.com/juice-shop/juice-shop.git juice-shop

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Como pusimos el "working-directory: juice-shop" arriba, correrá aquí dentro
      - name: Install dependencies
        run: npm install

      - name: Start Juice Shop
        run: |
          npm start &
          sleep 60 # 180 segundos es demasiado, con 60 suele bastar para que levante

      - name: Verify Juice Shop
        run: curl http://localhost:3000

      - name: ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: 'http://localhost:3000'
