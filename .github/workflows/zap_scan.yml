name: DAST Scan

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  zap_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio principal
        uses: actions/checkout@v4

      # Clonamos directamente en la raíz del runner, sin problemas de carpetas inexistentes
      - name: Clone Juice Shop
        run: git clone https://github.com/juice-shop/juice-shop.git juice-shop

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Ahora aplicamos el working-directory paso por paso, solo donde se necesita
      - name: Install dependencies
        working-directory: juice-shop
        run: npm install

      - name: Start Juice Shop
        working-directory: juice-shop
        run: |
          npm start &
          sleep 60

      - name: Verify Juice Shop
        run: curl http://localhost:3000

      - name: ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: 'http://localhost:3000'
